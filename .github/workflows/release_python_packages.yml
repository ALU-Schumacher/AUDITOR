          path: ./plugins/utilization_tool/dist
          name: utilization-plugin-release
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: plugins/utilization_tool/dist/
          attestations: false
      - name: Publish to GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: plugins/utilization_tool/dist/*
    

  publish-utilization-plugin-rpm:
    needs: publish-utilization-plugin-pip
    runs-on: ubuntu-latest
    container: almalinux:9
    defaults:
      run:
        working-directory: ./plugins/utilization_tool
    steps:
      - name: Check out repo
        uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          dnf install -y epel-release dnf-plugins-core
          dnf config-manager --set-enabled crb
          dnf install -y python3-pip rpm-build python3-virtualenv
          dnf groupinstall -y "Development Tools"
          pip install --upgrade pip
          pip install uv rpmvenv
      - name: Build RPM
        run: |
          uv pip compile pyproject.toml -o requirements.txt
          echo "." >> requirements.txt
